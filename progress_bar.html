
<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fortschritt Korrektur Vorabi</title>
  <style>
    :root {
      --ok: #2563eb;      /* Blau für gefüllten Teil */
      --ok2: #3b82f6;     /* Verlauf */
      --track: #ffffff;   /* Hintergrund des Balkens */
      --track-border: #1f2937; /* Dunkler Rahmen für klare Kontur */
      --hatch: #e5e7eb;   /* Schraffurfarbe im leeren Bereich */
      --text: #111827;
      --muted: #6b7280;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,"Noto Sans","Helvetica Neue",Arial,sans-serif;
      margin: 0; padding: 24px;
      background: white; color: var(--text);
      display: grid; place-items: center;
    }
    .card {
      width: min(720px, 92vw);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
    }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }
    .sub { color: var(--muted); margin-bottom: 14px; }

    /* Fortschrittsbalken */
    .bar-wrap {
      position: relative;
      background: var(--track);
      border: 2px solid var(--track-border);   /* klarer Rahmen */
      border-radius: var(--radius);
      overflow: hidden;
      height: 28px;
    }
    /* Leichte Schraffur im Hintergrund, damit auch 0% sichtbar ist */
    .bar-wrap::before {
      content: "";
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        45deg,
        transparent 0 10px,
        var(--hatch) 10px 20px
      );
      opacity: .35;
      pointer-events: none;
    }
    .bar {
      background: linear-gradient(90deg, var(--ok), var(--ok2));
      height: 100%;
      width: 0%;
      transition: width .4s ease;
    }
    .bar-label {
      margin-top: 10px;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <main class="card" role="region" aria-label="Fortschritt Korrektur">
    <h1>Aktueller Fortschritt der Korrektur des Vorabitur Mathematik</h1>
    <div class="sub" id="metaText"></div>

    <div class="bar-wrap">
      <div class="bar" id="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div>
    </div>
    <div class="bar-label" id="label" aria-live="polite"></div>
  </main>

  <script>
    // ===============================
    // EINSTELLUNGEN
    // ===============================
    const TOTAL = 162;     // 100% entsprechen 162 Teilaufgaben
    let x = 0;             // <-- HIER den aktuellen Stand eintragen (kontrollierte Teilaufgaben)

    // Optional: Wert aus der URL lesen (?x=Zahl), z. B. progress.html?x=37
    const params = new URLSearchParams(location.search);
    const urlX = params.get('x');
    if (urlX !== null && !Number.isNaN(Number(urlX))) {
      x = Number(urlX);
    }

    // Grenzen setzen
    if (x < 0) x = 0;
    if (x > TOTAL) x = TOTAL;

    // Prozentzahl berechnen
    const percent = Math.round((x / TOTAL) * 100);

    // DOM-Elemente
    const bar = document.getElementById('bar');
    const label = document.getElementById('label');
    const metaText = document.getElementById('metaText');

    // Anzeige aktualisieren
    bar.style.width = percent + '%';
    bar.setAttribute('aria-valuenow', String(percent));

    label.textContent = `${percent}%  (${x} von ${TOTAL})`;
    metaText.textContent = `Basis: ${TOTAL} Teilaufgaben = 100 %`;
  </script>
</body>
</html>
